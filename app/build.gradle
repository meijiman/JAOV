plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

repositories {
    mavenCentral()
    // libGDX releases (cần cho gdx-ai, ashley snapshot)
    maven { url 'https://oss.sonatype.org/content/repositories/releases/' }
}

dependencies {
    testImplementation libs.testng

    // libGDX
    implementation libs.gdx.core
    implementation libs.gdx.backend.lwjgl3
    implementation libs.gdx.box2d
    // natives (classifier không dùng được trong TOML nên khai báo trực tiếp)
    implementation "com.badlogicgames.gdx:gdx-platform:${libs.versions.gdx.get()}:natives-desktop"
    implementation "com.badlogicgames.gdx:gdx-box2d-platform:${libs.versions.gdx.get()}:natives-desktop"

    // Ashley ECS
    implementation libs.ashley

    // gdx-ai: thêm sau khi cần pathfinding
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(19)
    }
}

application {
    mainClass = 'com.jaov.moba.DesktopLauncher'
}

// libGDX cần Java module system mở ra cho LWJGL3
run {
    jvmArgs += [
        '--add-opens', 'java.base/java.nio=ALL-UNNAMED',
        '--add-opens', 'java.base/sun.nio.ch=ALL-UNNAMED'
    ]
}

tasks.named('test') {
    // Use TestNG for unit tests.
    useTestNG()
}
