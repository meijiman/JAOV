[versions]
guava = "33.5.0-jre"
testng = "7.5.1"
gdx = "1.13.1"
ashley = "1.7.4"

[libraries]
guava = { module = "com.google.guava:guava", version.ref = "guava" }
testng = { module = "org.testng:testng", version.ref = "testng" }

# libGDX core
gdx-core           = { module = "com.badlogicgames.gdx:gdx",                    version.ref = "gdx" }
gdx-backend-lwjgl3 = { module = "com.badlogicgames.gdx:gdx-backend-lwjgl3",     version.ref = "gdx" }
gdx-box2d          = { module = "com.badlogicgames.gdx:gdx-box2d",              version.ref = "gdx" }

# Ashley ECS
ashley = { module = "com.badlogicgames.ashley:ashley", version.ref = "ashley" }
